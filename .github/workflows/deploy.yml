name: Deploy

on:
  push:
    branches: [ main ]
    paths:
      - 'index.html'
      - 'js/**'
      - 'tests/**'
      - 'manifest.json'
      - 'assets/**'
  workflow_dispatch:  # Allow manual trigger

jobs:
  test:
    uses: ./.github/workflows/test.yml

  deploy-cloudflare:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deployment package
        run: |
          echo "Verifying deployment files..."
          ls -la index.html
          ls -la js/services/ | head -10
          ls -la assets/

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PROJECT_NAME: blinkgo
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "CLOUDFLARE_API_TOKEN not set, skipping deploy"
            exit 0
          fi
          echo "Deploying to Cloudflare Pages project: $CLOUDFLARE_PROJECT_NAME"
          # Use wrangler or direct API
          # Note: This is a placeholder. Real deploy needs wrangler action.
          echo "✓ Deployment package validated. Use Cloudflare Dashboard to upload."

  deploy-github-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  notify:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [deploy-cloudflare, deploy-github-pages]
    if: failure()
    steps:
      - name: Log failure
        run: |
          echo "❌ Deployment failed!"
          echo "Check the workflow logs for details."
          echo "View at: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"